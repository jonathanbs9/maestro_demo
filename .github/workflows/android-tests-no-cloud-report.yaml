name: Android Tests (No Cloud + Report)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
          export PATH="$PATH:$HOME/.maestro/bin"
          maestro --version

      - name: Create .env file from secrets
        run: |
          echo "EMAIL_USER=${{ secrets.EMAIL_USER }}" >> .env
          echo "EMAIL_PASS=${{ secrets.EMAIL_PASS }}" >> .env
          echo "MANAGER_EMAIL=${{ secrets.MANAGER_EMAIL }}" >> .env
          echo "LEAD_EMAIL=${{ secrets.LEAD_EMAIL }}" >> .env

      - name: Install dependencies
        run: npm ci

      - name: Verify environment
        run: |
          echo "=== Environment Verification ==="
          echo "Node.js:  $(node --version)"
          echo "npm:      $(npm --version)"
          echo "Java:     $(java --version 2>&1 | head -1)"
          echo "Maestro:  $(maestro --version)"
          echo "ADB:      $(adb --version | head -1)"
          echo "================================"

      - name: Start emulator and run recordings
        id: record_flows
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          disable-animations: true
          force-avd-creation: true
          emulator-options: >
            -no-window
            -gpu swiftshader_indirect
            -no-boot-anim
            -camera-back none
            -camera-front none
            -no-snapshot-save
          ram-size: 4096M
          script: |
            set -eu
            npm run android:install:wikipedia
            npm run record:all

      - name: Generate HTML report
        id: generate_report
        if: always()
        run: npm run report:generate

      - name: Create report archive
        id: archive_report
        if: steps.generate_report.outcome == 'success'
        run: node .scripts/archive-report.js

      - name: Send report emails
        id: send_emails
        if: steps.archive_report.outcome == 'success'
        continue-on-error: true
        run: |
          if [ -z "${{ secrets.EMAIL_USER }}" ]; then
            echo "EMAIL_USER secret is not set; skipping email report."
            exit 0
          fi
          node .scripts/send-report-email.js

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-wikipedia-report
          path: test-results

      - name: Prepare GitHub Pages content
        if: always()
        run: |
          rm -rf gh-pages
          mkdir -p gh-pages
          if [ -d test-results ]; then
            cp -R test-results gh-pages/test-results
          fi
          if [ -d recordings ]; then
            cp -R recordings gh-pages/recordings
          fi
          if [ -d test-report ]; then
            cp -R test-report gh-pages/test-report
          fi

      - name: Publish recordings and report to gh-pages
        if: always()
        continue-on-error: true
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: gh-pages

      - name: Print report URL
        if: always()
        run: |
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/test-results/test-report.html"
          echo "Report URL: $REPORT_URL"
          echo "REPORT_URL=$REPORT_URL" >> $GITHUB_ENV

      - name: Fail if recordings failed
        if: steps.record_flows.outcome == 'failure'
        run: |
          echo "record:all reported failures"
          exit 1

      - name: Notify Slack
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          STATUS: ${{ job.status }}
          REPO: ${{ github.repository }}
          WORKFLOW: ${{ github.workflow }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          REPORT_URL: ${{ env.REPORT_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL secret is not set; skipping Slack notification."
            exit 0
          fi

          case "$STATUS" in
            success)  STATUS_ICON="✅" ;;
            failure)  STATUS_ICON="❌" ;;
            cancelled) STATUS_ICON="⚪️" ;;
            *)        STATUS_ICON="ℹ️" ;;
          esac

          BRANCH_URL="https://github.com/${REPO}/tree/${BRANCH}"
          COMMIT_URL="https://github.com/${REPO}/commit/${COMMIT_SHA}"
          SHORT_SHA="${COMMIT_SHA:0:7}"

          payload=$(jq -nc \
            --arg repo "$REPO" \
            --arg workflow "$WORKFLOW" \
            --arg branch "$BRANCH" \
            --arg branch_url "$BRANCH_URL" \
            --arg commit_url "$COMMIT_URL" \
            --arg short_sha "$SHORT_SHA" \
            --arg status "$STATUS" \
            --arg icon "$STATUS_ICON" \
            --arg url "$RUN_URL" \
            --arg report "${REPORT_URL:-N/A}" \
            '{text: ($icon + "  *Android Tests (No Cloud Report)*" + "\n" +
                     "*Status:* " + $status + "\n" +
                     "*Repo:* <" + $branch_url + "|" + $repo + " (" + $branch + ")>\n" +
                     "*Commit:* <" + $commit_url + "|" + $short_sha + ">\n" +
                     "*Run:* <" + $url + "|View on GitHub>\n" +
                     "*Report:* <" + $report + "|Open HTML report>")}' )
          curl -X POST -H 'Content-type: application/json' --data "$payload" "$WEBHOOK_URL"
