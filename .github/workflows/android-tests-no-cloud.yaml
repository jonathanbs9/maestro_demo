name: Android Tests (No Cloud)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
          export PATH="$PATH:$HOME/.maestro/bin"

      - name: Install dependencies
        run: npm ci

      - name: Verify environment
        run: |
          echo "=== Environment Verification ==="
          echo "Node.js:  $(node --version)"
          echo "npm:      $(npm --version)"
          echo "Java:     $(java --version 2>&1 | head -1)"
          echo "Maestro:  $(maestro --version)"
          echo "ADB:      $(adb --version | head -1)"
          echo "================================"

      - name: Start emulator and run Maestro tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          disable-animations: true
          force-avd-creation: true
          emulator-options: >
            -no-window
            -gpu swiftshader_indirect
            -no-boot-anim
            -camera-back none
            -camera-front none
            -no-snapshot-save
          ram-size: 4096M
          script: |
            npm run android:install:wikipedia
            npm run maestro:test:wikipedia

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-wikipedia-report
          path: test-results

      - name: Notify Slack
        if: always()
        env:
          WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          STATUS: ${{ job.status }}
          REPO: ${{ github.repository }}
          WORKFLOW: ${{ github.workflow }}
          BRANCH: ${{ github.ref_name }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL secret is not set; skipping Slack notification."
            exit 0
          fi
          payload=$(jq -nc \
            --arg repo "$REPO" \
            --arg workflow "$WORKFLOW" \
            --arg branch "$BRANCH" \
            --arg status "$STATUS" \
            --arg url "$RUN_URL" \
            '{text: ("[" + $status + "] " + $workflow + " | " + $repo + " (" + $branch + ")\n" + $url)}')
          curl -X POST -H 'Content-type: application/json' --data "$payload" "$WEBHOOK_URL"
